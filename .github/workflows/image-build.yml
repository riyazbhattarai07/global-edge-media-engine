# ─────────────────────────────────────────────────────────────────────────────
# Docker Image Build & Push Workflow
# Triggers:  push to main when ecs/** changes + manual dispatch
# Auth:      AWS OIDC
# Features:  Docker layer caching, image vulnerability scanning, multi-tag push
# ─────────────────────────────────────────────────────────────────────────────
name: "Build & Push Encoder Image"

on:
  push:
    branches: ["main"]
    paths:
      - "ecs/**"
      - ".github/workflows/image-build.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (default: git SHA)"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write
  security-events: write  # For Trivy SARIF upload

env:
  AWS_REGION: "us-east-1"
  IMAGE_NAME: "media-engine-encoder"

jobs:
  build-push:
    name: "Build, Scan & Push"
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.push.outputs.image_uri }}
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-ImageBuild

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image metadata
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          REPO="${ECR_REGISTRY}/${{ env.IMAGE_NAME }}"
          SHORT_SHA="${GITHUB_SHA::8}"
          TAG="${{ inputs.image_tag != '' && inputs.image_tag || env.SHORT_SHA }}"
          echo "registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "repo=${REPO}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "uri=${REPO}:${TAG}" >> $GITHUB_OUTPUT
        env:
          SHORT_SHA: "${GITHUB_SHA::8}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with layer cache)
        uses: docker/build-push-action@v5
        with:
          context: ./ecs
          file: ./ecs/Dockerfile
          push: false
          load: true
          tags: |
            ${{ steps.meta.outputs.uri }}
            ${{ steps.meta.outputs.repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.uri }}
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"   # Don't fail on scan findings (set to 1 to enforce)

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Push image to ECR
        id: push
        run: |
          docker push ${{ steps.meta.outputs.uri }}
          docker push ${{ steps.meta.outputs.repo }}:latest
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ steps.meta.outputs.uri }})
          echo "image_uri=${{ steps.meta.outputs.uri }}" >> $GITHUB_OUTPUT
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "## Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- **URI:** \`${{ steps.meta.outputs.uri }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${DIGEST}\`" >> $GITHUB_STEP_SUMMARY

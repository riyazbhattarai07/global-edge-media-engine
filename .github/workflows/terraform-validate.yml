name: Validate

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform Init
        run: terraform -chdir=terraform/media-engine init -backend=false
      - name: Terraform Validate
        run: terraform -chdir=terraform/media-engine validate
      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/
